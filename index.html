<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Color Randomizer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet" />
  <link href="./output.css" rel="stylesheet" />
</head>

<body class="bg-background-dark text-white overflow-x-hidden font-onest">
  <div class="relative flex min-h-screen flex-col">
    <header class="border-b border-border-dark bg-background-dark/50 backdrop-blur-md sticky top-0 z-50">
      <nav class="px-4 md:px-10 py-3 flex items-center justify-between max-w-300 mx-auto w-full">
        <div class="flex items-center gap-4 text-white">
          <div class="text-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
              class="icon icon-tabler icons-tabler-filled icon-tabler-palette">
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path
                d="M12 2c5.498 0 10 4.002 10 9c0 1.351 -.6 2.64 -1.654 3.576c-1.03 .914 -2.412 1.424 -3.846 1.424h-2.516a1 1 0 0 0 -.5 1.875a1 1 0 0 1 .194 .14a2.3 2.3 0 0 1 -1.597 3.99l-.156 -.009l.068 .004l-.273 -.004c-5.3 -.146 -9.57 -4.416 -9.716 -9.716l-.004 -.28c0 -5.523 4.477 -10 10 -10m-3.5 6.5a2 2 0 0 0 -1.995 1.85l-.005 .15a2 2 0 1 0 2 -2m8 0a2 2 0 0 0 -1.995 1.85l-.005 .15a2 2 0 1 0 2 -2m-4 -3a2 2 0 0 0 -1.995 1.85l-.005 .15a2 2 0 1 0 2 -2" />
            </svg>
          </div>
          <h2 class="text-lg font-bold">Color Randomizer</h2>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="flex items-center justify-center rounded-full size-10 bg-surface-dark text-white hover:bg-primary hover:text-background-dark transition-colors duration-200 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
              class="icon icon-tabler icons-tabler-filled icon-tabler-settings">
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path
                d="M14.647 4.081a.724 .724 0 0 0 1.08 .448c2.439 -1.485 5.23 1.305 3.745 3.744a.724 .724 0 0 0 .447 1.08c2.775 .673 2.775 4.62 0 5.294a.724 .724 0 0 0 -.448 1.08c1.485 2.439 -1.305 5.23 -3.744 3.745a.724 .724 0 0 0 -1.08 .447c-.673 2.775 -4.62 2.775 -5.294 0a.724 .724 0 0 0 -1.08 -.448c-2.439 1.485 -5.23 -1.305 -3.745 -3.744a.724 .724 0 0 0 -.447 -1.08c-2.775 -.673 -2.775 -4.62 0 -5.294a.724 .724 0 0 0 .448 -1.08c-1.485 -2.439 1.305 -5.23 3.744 -3.745a.722 .722 0 0 0 1.08 -.447c.673 -2.775 4.62 -2.775 5.294 0zm-2.647 4.919a3 3 0 1 0 0 6a3 3 0 0 0 0 -6z" />
            </svg>
          </button>
          <img src="/assets/icon.webp" alt="" class="rounded-full size-10 border-2 border-primary" />
        </div>
      </nav>
    </header>
    <main class="grow flex flex-col items-center justify-start py-8 px-4 md:px-8 w-full max-w-300 mx-auto gap-8">
      <section class="w-full flex flex-col items-center justify-center gap-8 py-8 md:py-12">
        <div class="group relative flex items-center justify-center">
          <div class="absolute inset-0 bg-[#FF5733] blur-3xl opacity-20 rounded-full transition-all duration-500"></div>
          <div
            class="relative size-64 md:size-80 rounded-full shadow-2xl flex items-center justify-center border-4 border-white/10 transition-transform duration-300 hover:scale-105"
            style="background-color: #ff5733">
            <span class="sr-only">Current Color: #FF5733</span>
          </div>
        </div>

        <div class="flex flex-col items-center gap-6 z-10 w-full max-w-md">
          <div class="flex p-1 bg-surface-dark border border-border-dark rounded-full">
            <button
              class="px-6 py-2 rounded-full text-sm font-bold bg-primary text-background-dark shadow-sm transition-all">
              HEX
            </button>
            <button
              class="px-6 py-2 rounded-full text-sm font-bold text-white/60 hover:text-white hover:bg-white/5 transition-all cursor-pointer">
              RGB
            </button>
            <button
              class="px-6 py-2 rounded-full text-sm font-bold text-white/60 hover:text-white hover:bg-white/5 transition-all cursor-pointer">
              HSL
            </button>
          </div>

          <div class="flex flex-col items-center gap-2 w-full">
            <div
              class="flex items-center justify-between gap-3 bg-surface-dark px-6 py-4 rounded-2xl border border-border-dark hover:border-primary/50 transition-colors group cursor-pointer w-full">
              <h1 class="text-3xl md:text-4xl font-black text-white font-mono uppercase text-center w-full">
                #FF5733
              </h1>
              <button class="text-white/50 group-hover:text-primary transition-colors shrink-0" title="Copy Color Code">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
                  class="icon icon-tabler icons-tabler-filled icon-tabler-clipboard">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path
                    d="M17.997 4.17a3 3 0 0 1 2.003 2.83v12a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-12a3 3 0 0 1 2.003 -2.83a4 4 0 0 0 3.997 3.83h4a4 4 0 0 0 3.98 -3.597zm-3.997 -2.17a2 2 0 1 1 0 4h-4a2 2 0 1 1 0 -4z" />
                </svg>
              </button>
            </div>
            <p class="text-white/40 text-sm font-medium">
              Click to copy code
            </p>
          </div>
          <button
            class="flex items-center gap-2 bg-primary hover:bg-green-400 text-background-dark px-8 py-4 rounded-full text-lg font-bold shadow-[0_0_20px_rgba(70,236,19,0.3)] hover:shadow-[0_0_30px_rgba(70,236,19,0.5)] transition-all duration-300 transform active:scale-95 mt-2 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-arrows-shuffle">
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M18 4l3 3l-3 3" />
              <path d="M18 20l3 -3l-3 -3" />
              <path d="M3 7h3a5 5 0 0 1 5 5a5 5 0 0 0 5 5h5" />
              <path d="M21 7h-5a4.978 4.978 0 0 0 -3 1m-4 8a4.984 4.984 0 0 1 -3 1h-3" />
            </svg>
            <span>Generate New Color</span>
          </button>
        </div>
      </section>

      <section class="w-full max-w-200">
        <div class="grid grid-cols-3 gap-4">
          <div
            class="flex flex-col items-center gap-1 rounded-2xl bg-surface-dark border border-border-dark p-6 hover:border-red-500/50 transition-colors group">
            <p class="text-white/60 text-sm font-medium group-hover:text-red-400">
              RED
            </p>
            <p class="text-white text-3xl font-bold">255</p>
            <div class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden">
              <div class="bg-red-500 h-full rounded-full" style="width: 100%"></div>
            </div>
          </div>
          <div
            class="flex flex-col items-center gap-1 rounded-2xl bg-surface-dark border border-border-dark p-6 hover:border-green-500/50 transition-colors group">
            <p class="text-white/60 text-sm font-medium group-hover:text-green-400">
              GREEN
            </p>
            <p class="text-white text-3xl font-bold">87</p>
            <div class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden">
              <div class="bg-green-500 h-full rounded-full" style="width: 34%"></div>
            </div>
          </div>
          <div
            class="flex flex-col items-center gap-1 rounded-2xl bg-surface-dark border border-border-dark p-6 hover:border-blue-500/50 transition-colors group">
            <p class="text-white/60 text-sm font-medium group-hover:text-blue-400">
              BLUE
            </p>
            <p class="text-white text-3xl font-bold">51</p>
            <div class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden">
              <div class="bg-blue-500 h-full rounded-full" style="width: 20%"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="w-full max-w-200 flex flex-col gap-6 mt-8">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-2xl font-bold text-white">
              Recent Colors
            </h3>
            <p class="text-white/50 text-sm">History of generated palettes</p>
          </div>
          <button class="text-primary text-sm font-bold hover:underline cursor-pointer">
            Clear History
          </button>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div
            class="flex items-center gap-4 rounded-xl border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group">
            <div class="size-12 rounded-full shadow-inner border border-white/10" style="background-color: #33ff57">
            </div>
            <div class="flex flex-col">
              <span class="text-white font-bold font-mono group-hover:text-primary transition-colors">#33FF57</span>
              <span class="text-xs text-white/40">10:42 AM</span>
            </div>
          </div>
          <div
            class="flex items-center gap-4 rounded-xl border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group">
            <div class="size-12 rounded-full shadow-inner border border-white/10" style="background-color: #3357ff">
            </div>
            <div class="flex flex-col">
              <span class="text-white font-bold font-mono group-hover:text-primary transition-colors">#3357FF</span>
              <span class="text-xs text-white/40">10:41 AM</span>
            </div>
          </div>
          <div
            class="flex items-center gap-4 rounded-xl border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group">
            <div class="size-12 rounded-full shadow-inner border border-white/10" style="background-color: #f333ff">
            </div>
            <div class="flex flex-col">
              <span class="text-white font-bold font-mono group-hover:text-primary transition-colors">#F333FF</span>
              <span class="text-xs text-white/40">10:39 AM</span>
            </div>
          </div>
          <div
            class="flex items-center gap-4 rounded-xl border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group">
            <div class="size-12 rounded-full shadow-inner border border-white/10" style="background-color: #ffd433">
            </div>
            <div class="flex flex-col">
              <span class="text-white font-bold font-mono group-hover:text-primary transition-colors">#FFD433</span>
              <span class="text-xs text-white/40">10:35 AM</span>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="border-t border-border-dark mt-auto bg-background-dark/30">
      <div class="max-w-300 mx-auto px-6 py-8 flex flex-row items-center justify-between gap-6">
        <p class="text-white/40 text-sm">
          Made by @juanfeoru
        </p>

        <a class="text-white/40 hover:text-white transition-colors" href="#">
          <span class="sr-only">GitHub</span>
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z">
            </path>
          </svg>
        </a>

      </div>
    </footer>
  </div>
</body>

</html>
