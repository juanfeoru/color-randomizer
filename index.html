<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Color Randomizer - Generador de Colores Aleatorios</title>
    <link href="./output.css" rel="stylesheet" />
  </head>

  <body class="bg-background-dark font-onest overflow-x-hidden">
    <header class="border-b border-border-dark">
      <nav class="px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
            class="text-primary"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M12 2c5.498 0 10 4.002 10 9c0 1.351 -.6 2.64 -1.654 3.576c-1.03 .914 -2.412 1.424 -3.846 1.424h-2.516a1 1 0 0 0 -.5 1.875a1 1 0 0 1 .194 .14a2.3 2.3 0 0 1 -1.597 3.99l-.156 -.009l.068 .004l-.273 -.004c-5.3 -.146 -9.57 -4.416 -9.716 -9.716l-.004 -.28c0 -5.523 4.477 -10 10 -10m-3.5 6.5a2 2 0 0 0 -1.995 1.85l-.005 .15a2 2 0 1 0 2 -2m8 0a2 2 0 0 0 -1.995 1.85l-.005 .15a2 2 0 1 0 2 -2m-4 -3a2 2 0 0 0 -1.995 1.85l-.005 .15a2 2 0 1 0 2 -2"
            />
          </svg>
          <h2 class="font-bold text-white text-xl">Color Randomizer</h2>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="flex items-center justify-center rounded-full size-10 text-white bg-surface-dark hover:bg-primary hover:text-background-dark transition-colors duration-200 cursor-pointer"
            aria-label="Abrir configuración"
            type="button"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path
                d="M14.647 4.081a.724 .724 0 0 0 1.08 .448c2.439 -1.485 5.23 1.305 3.745 3.744a.724 .724 0 0 0 .447 1.08c2.775 .673 2.775 4.62 0 5.294a.724 .724 0 0 0 -.448 1.08c1.485 2.439 -1.305 5.23 -3.744 3.745a.724 .724 0 0 0 -1.08 .447c-.673 2.775 -4.62 2.775 -5.294 0a.724 .724 0 0 0 -1.08 -.448c-2.439 1.485 -5.23 -1.305 -3.745 -3.744a.724 .724 0 0 0 -.447 -1.08c-2.775 -.673 -2.775 -4.62 0 -5.294a.724 .724 0 0 0 .448 -1.08c-1.485 -2.439 1.305 -5.23 3.744 -3.745a.722 .722 0 0 0 1.08 -.447c.673 -2.775 4.62 -2.775 5.294 0zm-2.647 4.919a3 3 0 1 0 0 6a3 3 0 0 0 0 -6z"
              />
            </svg>
          </button>
          <img
            src="/assets/icon.webp"
            alt=""
            width="160"
            height="160"
            class="rounded-full size-10 border-2 border-primary"
          />
        </div>
      </nav>
    </header>

    <main
      class="grow flex flex-col items-center justify-start py-8 px-4 max-w-300 w-full gap-8 mx-auto"
    >
      <!-- Hero / Main Display Area -->
      <section
        class="w-full flex flex-col items-center justify-center gap-8 py-8"
      >
        <!-- Color Display Circle -->
        <div class="group relative flex items-center justify-center">
          <!-- Glow effect behind -->
          <div
            class="absolute inset-0 bg-[#FF5733] blur-3xl opacity-20 rounded-full transition-all duration-500"
          ></div>
          <div
            class="relative size-64 rounded-full shadow-2xl flex items-center justify-center border-4 border-white/10 transition-transform duration-300 hover:scale-105"
            style="background-color: #ff5733"
          ></div>
        </div>
        <!-- Hex Code and Controls -->
        <div class="flex flex-col items-center gap-6 z-10">
          <div class="flex flex-col items-center gap-2">
            <div
              class="flex items-center gap-3 bg-surface-dark px-6 py-3 rounded-full border border-border-dark hover:border-primary/50 transition-colors group cursor-pointer"
            >
              <h1 class="text-4xl font-bold text-white uppercase">#FF5733</h1>
              <button>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="text-white/50 group-hover:text-primary transition-colors"
                  aria-hidden="true"
                >
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path
                    d="M17.997 4.17a3 3 0 0 1 2.003 2.83v12a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-12a3 3 0 0 1 2.003 -2.83a4 4 0 0 0 3.997 3.83h4a4 4 0 0 0 3.98 -3.597zm-3.997 -2.17a2 2 0 1 1 0 4h-4a2 2 0 1 1 0 -4z"
                  />
                </svg>
              </button>
            </div>
            <p class="text-white/40 text-sm font-medium">
              Click to copy HEX code
            </p>
          </div>
          <button
            class="flex items-center gap-2 bg-primary hover:bg-green-400 text-background-dark px-8 py-4 rounded-full text-lg font-bold shadow-[0_0_20px_rgba(70,236,19,0.3)] hover:shadow-[(0_0_30px_rgba(70,236,19,0.5))] transition-all duration-300 transform active:scale-95 cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M18 4l3 3l-3 3" />
              <path d="M18 20l3 -3l-3 -3" />
              <path d="M3 7h3a5 5 0 0 1 5 5a5 5 0 0 0 5 5h5" />
              <path d="M3 17h3a5 5 0 0 0 5 -5a5 5 0 0 1 5 -5h5" />
            </svg>
            <span class="font-semibold">Generate New Color</span>
          </button>
        </div>
      </section>

      <!-- Stats / RGB Breakdown -->
      <section class="w-full max-w-200">
        <div class="grid grid-cols-3 gap-4">
          <div
            class="flex flex-col items-center gap-1 rounded-2xl bg-surface-dark border border-border-dark p-6 hover:border-red-500/50 transition-colors group"
          >
            <p
              class="text-white/60 text-sm font-medium group-hover:text-red-400"
            >
              RED
            </p>
            <p class="text-white text-xl font-bold">255</p>
            <div
              class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden"
            >
              <div
                class="bg-red-500 h-full rounded-full"
                style="width: 100%"
              ></div>
            </div>
          </div>
          <div
            class="flex flex-col items-center gap-1 rounded-2xl bg-surface-dark border border-border-dark p-6 hover:border-green-500/50 transition-colors group"
          >
            <p
              class="text-white/60 text-sm font-medium group-hover:text-green-400"
            >
              GREEN
            </p>
            <p class="text-white text-xl font-bold">87</p>
            <div
              class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden"
            >
              <div
                class="bg-green-500 h-full rounded-full"
                style="width: 34%"
              ></div>
            </div>
          </div>

          <div
            class="flex flex-col items-center gap-1 rounded-2xl bg-surface-dark border border-border-dark p-6 hover:border-blue-500/50 transition-colors group"
          >
            <p
              class="text-white/60 text-sm font-medium group-hover:text-blue-400"
            >
              BLUE
            </p>
            <p class="text-white text-xl font-bold">51</p>
            <div
              class="w-full bg-white/10 h-1.5 rounded-full mt-2 overflow-hidden"
            >
              <div
                class="bg-blue-500 h-full rounded-full"
                style="width: 20%"
              ></div>
            </div>
          </div>
        </div>
      </section>

      <!-- History Section -->
      <section class="w-full max-w-200 flex flex-col gap-6 mt-8">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-xl font-bold text-white">Recent Colors</h3>
            <p class="text-white/50 text-sm">History of generated palettes</p>
          </div>
          <button
            class="text-primary text-sm font-bold cursor-pointer hover:underline"
          >
            Clear History
          </button>
        </div>
        <div class="grid grid-cols-2 gap-4 sm:grid-cols-4">
          <!-- History Item 1 -->
          <div
            class="flex items-center gap-4 rounded-full border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group"
          >
            <div
              class="size-12 rounded-full shadow-inner border border-white/10"
              style="background-color: #33ff57"
            ></div>
            <div class="flex flex-col">
              <span
                class="text-white font-bold tracking-wide group-hover:text-primary transition-colors"
                >#33FF57
              </span>
              <span class="text-xs text-white/40">10:42 AM</span>
            </div>
          </div>
          <!-- History Item 2 -->
          <div
            class="flex items-center gap-4 rounded-full border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group"
          >
            <div
              class="size-12 rounded-full shadow-inner border border-white/10"
              style="background-color: #3357ff"
            ></div>
            <div class="flex flex-col">
              <span
                class="text-white font-bold tracking-wide group-hover:text-primary transition-colors"
                >#3357FF
              </span>
              <span class="text-xs text-white/40">10:41 AM</span>
            </div>
          </div>
          <!-- History Item 3 -->
          <div
            class="flex items-center gap-4 rounded-full border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group"
          >
            <div
              class="size-12 rounded-full shadow-inner border border-white/10"
              style="background-color: #f333ff"
            ></div>
            <div class="flex flex-col">
              <span
                class="text-white font-bold tracking-wide group-hover:text-primary transition-colors"
                >#F333FF
              </span>
              <span class="text-xs text-white/40">10:39 AM</span>
            </div>
          </div>
          <!-- History Item 4 -->
          <div
            class="flex items-center gap-4 rounded-full border border-border-dark bg-surface-dark p-3 hover:bg-white/5 transition-colors cursor-pointer group"
          >
            <div
              class="size-12 rounded-full shadow-inner border border-white/10"
              style="background-color: #ffd433"
            ></div>
            <div class="flex flex-col">
              <span
                class="text-white font-bold tracking-wide group-hover:text-primary transition-colors"
                >#FFD433
              </span>
              <span class="text-xs text-white/40">10:35 AM</span>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- Footer -->
    <footer class="border-t border-border-dark mt-auto bg-background-dark/30">
      <div
        class="max-w-300 mx-auto px-6 py-8 flex items-center justify-between gap-6 flex-row"
      >
        <p class="text-white/40 text-sm">Made by @juanfeoru</p>
        <div class="flex gap-4 ml-4">
          <a href="#" class="text-white/40 hover:text-white transition-colors">
            <i
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="icon icon-tabler icons-tabler-filled icon-tabler-brand-github"
              >
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path
                  d="M5.315 2.1c.791 -.113 1.9 .145 3.333 .966l.272 .161l.16 .1l.397 -.083a13.3 13.3 0 0 1 4.59 -.08l.456 .08l.396 .083l.161 -.1c1.385 -.84 2.487 -1.17 3.322 -1.148l.164 .008l.147 .017l.076 .014l.05 .011l.144 .047a1 1 0 0 1 .53 .514a5.2 5.2 0 0 1 .397 2.91l-.047 .267l-.046 .196l.123 .163c.574 .795 .93 1.728 1.03 2.707l.023 .295l.007 .272c0 3.855 -1.659 5.883 -4.644 6.68l-.245 .061l-.132 .029l.014 .161l.008 .157l.004 .365l-.002 .213l-.003 3.834a1 1 0 0 1 -.883 .993l-.117 .007h-6a1 1 0 0 1 -.993 -.883l-.007 -.117v-.734c-1.818 .26 -3.03 -.424 -4.11 -1.878l-.535 -.766c-.28 -.396 -.455 -.579 -.589 -.644l-.048 -.019a1 1 0 0 1 .564 -1.918c.642 .188 1.074 .568 1.57 1.239l.538 .769c.76 1.079 1.36 1.459 2.609 1.191l.001 -.678l-.018 -.168a5.03 5.03 0 0 1 -.021 -.824l.017 -.185l.019 -.12l-.108 -.024c-2.976 -.71 -4.703 -2.573 -4.875 -6.139l-.01 -.31l-.004 -.292a5.6 5.6 0 0 1 .908 -3.051l.152 -.222l.122 -.163l-.045 -.196a5.2 5.2 0 0 1 .145 -2.642l.1 -.282l.106 -.253a1 1 0 0 1 .529 -.514l.144 -.047l.154 -.03z"
                /></svg
            ></i>
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
